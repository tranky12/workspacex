name: Release PresaleX Desktop App

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

# Build-only placeholders — real secrets belong in .env locally / repo Secrets for deploys.
env:
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
  AUTH_SECRET: ci-build-placeholder-use-real-secret-in-production-32chars
  AUTH_GOOGLE_ID: ci-build-placeholder-google-id
  AUTH_GOOGLE_SECRET: ci-build-placeholder-google-secret
  NEXTAUTH_URL: http://127.0.0.1:3001
  # Unsigned local/CI builds (add APPLE_* / WINDOWS_* secrets when you have signing certs)
  CSC_IDENTITY_AUTO_SELECT: false

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js App
        run: npm run build

      - name: Build/Release Electron App (Mac)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac -c electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build/Release Electron App (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win -c electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
