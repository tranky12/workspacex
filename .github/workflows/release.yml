name: Release COSPACEX Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag cho bản phát hành (khớp version trong package.json, ví dụ v2.2.4)'
        required: true
        default: 'v2.2.4'

permissions:
  contents: write

# Build-only placeholders — production dùng .env / GitHub Secrets thật.
env:
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
  AUTH_SECRET: ci-build-placeholder-use-real-secret-in-production-32chars
  AUTH_GOOGLE_ID: ci-build-placeholder-google-id
  AUTH_GOOGLE_SECRET: ci-build-placeholder-google-secret
  NEXTAUTH_URL: http://127.0.0.1:3001

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js App
        run: npm run build

      - name: Setup macOS code signing + notarization (optional)
        if: vars.ENABLE_CODE_SIGNING == 'true'
        run: |
          echo "${{ secrets.MACOS_CERT_P12 }}" | base64 --decode > mac.p12
          echo "CSC_LINK=${GITHUB_WORKSPACE}/mac.p12" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=${{ secrets.MACOS_CERT_PASSWORD }}" >> "$GITHUB_ENV"
          echo "CSC_IDENTITY_AUTO_SELECT=true" >> "$GITHUB_ENV"

      - name: Build Electron (macOS DMG)
        run: |
          if [ "${{ vars.ENABLE_CODE_SIGNING }}" = "true" ]; then
            npx electron-builder --mac -c electron-builder.json -c electron-builder.signing.json --publish never
          else
            npx electron-builder --mac -c electron-builder.json --publish never
          fi
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js App
        run: npm run build

      - name: Setup Windows Authenticode (optional)
        if: vars.ENABLE_CODE_SIGNING == 'true'
        shell: bash
        run: |
          echo "${{ secrets.WINDOWS_CERT_PFX }}" | base64 -d > cert.pfx
          echo "CSC_LINK=${GITHUB_WORKSPACE}/cert.pfx" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=${{ secrets.WINDOWS_CERT_PASSWORD }}" >> "$GITHUB_ENV"
          echo "CSC_IDENTITY_AUTO_SELECT=true" >> "$GITHUB_ENV"

      - name: Build Electron (Windows NSIS)
        shell: bash
        run: |
          if [ "${{ vars.ENABLE_CODE_SIGNING }}" = "true" ]; then
            npx electron-builder --win -c electron-builder.json -c electron-builder.signing.json --publish never
          else
            npx electron-builder --win -c electron-builder.json --publish never
          fi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist/*.exe
          if-no-files-found: error

  publish-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing release for tag: $TAG"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets

      - name: List release files
        run: ls -laR release-assets

      - name: Create GitHub Release with DMG + EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: COSPACEX ${{ steps.meta.outputs.tag }}
          draft: false
          make_latest: true
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/*.dmg
            release-assets/*.exe
